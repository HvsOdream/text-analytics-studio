// ===== 유틸 =====
function getOpenWeek() {
  const now = new Date();
  const diff = now - SEMESTER_START;
  const weekNum = Math.floor(diff / (7 * 24 * 60 * 60 * 1000)) + 1;
  return Math.max(1, Math.min(weekNum, 15));
}

function formatFileSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / 1048576).toFixed(1) + ' MB';
}

function saveStudentInfo() {
  const name = document.getElementById('studentName').value.trim();
  const id = document.getElementById('studentId').value.trim();
  if (name || id) {
    localStorage.setItem('ta_student_name', name);
    localStorage.setItem('ta_student_id', id);
    const badge = document.getElementById('savedBadge');
    badge.classList.add('show');
    setTimeout(() => badge.classList.remove('show'), 2000);
  }
}

function loadStudentInfo() {
  const name = localStorage.getItem('ta_student_name') || '';
  const id = localStorage.getItem('ta_student_id') || '';
  document.getElementById('studentName').value = name;
  document.getElementById('studentId').value = id;
}

function getSubmissions() {
  try {
    return JSON.parse(localStorage.getItem('ta_submissions') || '{}');
  } catch { return {}; }
}

function markSubmitted(week) {
  const subs = getSubmissions();
  subs[week] = new Date().toISOString();
  localStorage.setItem('ta_submissions', JSON.stringify(subs));
}

// ===== 렌더링 =====
function renderWeeks() {
  const container = document.getElementById('weekContainer');
  const openWeek = getOpenWeek();
  const submissions = getSubmissions();

  container.innerHTML = WEEKS.map(w => {
    const isOpen = w.week <= openWeek;
    const isSubmitted = !!submissions[w.week];
    const hasContent = !!w.content;
    const isNoUpload = w.week === 8 || w.week === 15; // 중간/기말은 별도

    let statusHtml = '';
    if (!isOpen) {
      statusHtml = '<span class="week-status locked">준비 중</span>';
    } else if (isSubmitted) {
      statusHtml = '<span class="week-status submitted">제출 완료</span>';
    } else {
      statusHtml = '<span class="week-status open">제출 가능</span>';
    }

    let bodyHtml = '';
    if (isOpen) {
      bodyHtml = `<div class="week-body"><div class="week-content">`;

      if (hasContent) {
        bodyHtml += w.content;
      } else {
        bodyHtml += `
          <div class="assignment-section">
            <p style="color:var(--gray-400); text-align:center; padding:1.5rem 0;">
              과제 내용이 해당 주차에 공개됩니다.
            </p>
          </div>
        `;
      }

      // 업로드 영역 (중간/기말 제외, 내용이 있는 주차만)
      if (hasContent && !isNoUpload) {
        bodyHtml += `
          <div class="upload-area">
            <h4>&#x1F4E4; 파일 제출</h4>
            <div class="dropzone" id="dropzone-${w.week}" onclick="document.getElementById('fileInput-${w.week}').click()">
              <div class="icon">&#x1F4C4;</div>
              <div class="main-text">파일을 여기에 드래그하거나 클릭하여 선택</div>
              <div class="sub-text">PDF, DOCX, HWP, TXT — 최대 10MB</div>
              <input type="file" id="fileInput-${w.week}" accept=".pdf,.docx,.hwp,.txt,.doc,.pptx,.xlsx,.zip" />
            </div>
            <div class="file-preview" id="preview-${w.week}">
              <span class="name" id="fileName-${w.week}"></span>
              <span class="size" id="fileSize-${w.week}"></span>
              <span class="remove" onclick="removeFile(${w.week})">&#x2715;</span>
            </div>
            <button class="submit-btn" id="submitBtn-${w.week}" disabled onclick="submitFile(${w.week})">
              제출하기
            </button>
            <div class="submit-result" id="result-${w.week}"></div>
          </div>
        `;
      }

      bodyHtml += `</div></div>`;
    }

    return `
      <div class="week-card ${!isOpen ? 'locked' : ''}" id="card-${w.week}">
        <div class="week-header" onclick="toggleWeek(${w.week})">
          <div class="week-badge ${isOpen ? w.color : 'gray'}">${w.week}</div>
          <div class="week-info">
            <h3>${w.title}</h3>
            <p>${w.subtitle}</p>
          </div>
          ${statusHtml}
          ${isOpen ? '<span class="week-arrow">&#x25BC;</span>' : ''}
        </div>
        ${bodyHtml}
      </div>
    `;
  }).join('');

  // 이벤트 바인딩 (파일 입력 + 드래그앤드롭)
  WEEKS.forEach(w => {
    if (w.week > openWeek || !w.content) return;
    const input = document.getElementById(`fileInput-${w.week}`);
    const dropzone = document.getElementById(`dropzone-${w.week}`);
    if (!input || !dropzone) return;

    input.addEventListener('change', (e) => handleFile(w.week, e.target.files[0]));

    dropzone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropzone.classList.add('dragover');
    });
    dropzone.addEventListener('dragleave', () => {
      dropzone.classList.remove('dragover');
    });
    dropzone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropzone.classList.remove('dragover');
      if (e.dataTransfer.files.length) handleFile(w.week, e.dataTransfer.files[0]);
    });
  });
}

// ===== 파일 처리 =====
const selectedFiles = {};

function handleFile(week, file) {
  if (!file) return;
  if (file.size > 10 * 1024 * 1024) {
    alert('파일 크기가 10MB를 초과합니다.');
    return;
  }
  selectedFiles[week] = file;
  document.getElementById(`fileName-${week}`).textContent = file.name;
  document.getElementById(`fileSize-${week}`).textContent = formatFileSize(file.size);
  document.getElementById(`preview-${week}`).classList.add('show');
  document.getElementById(`submitBtn-${week}`).disabled = false;
}

function removeFile(week) {
  delete selectedFiles[week];
  document.getElementById(`preview-${week}`).classList.remove('show');
  document.getElementById(`submitBtn-${week}`).disabled = true;
  document.getElementById(`fileInput-${week}`).value = '';
}

// ===== 제출 =====
async function submitFile(week) {
  const name = document.getElementById('studentName').value.trim();
  const studentId = document.getElementById('studentId').value.trim();
  const file = selectedFiles[week];
  const btn = document.getElementById(`submitBtn-${week}`);
  const resultEl = document.getElementById(`result-${week}`);

  if (!name || !studentId) {
    alert('이름과 학번을 입력해주세요.');
    document.getElementById('studentName').focus();
    return;
  }
  if (!file) return;

  // 버튼 상태 변경
  btn.disabled = true;
  btn.classList.add('uploading');
  btn.textContent = '업로드 중...';
  resultEl.className = 'submit-result';
  resultEl.style.display = 'none';

  try {
    // 파일을 Base64로 변환
    const base64 = await fileToBase64(file);

    const payload = {
      name,
      studentId,
      week: String(week),
      fileName: file.name,
      fileData: base64,
      mimeType: file.type || 'application/octet-stream'
    };

    const response = await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors', // Apps Script CORS 제한 대응
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });

    // no-cors에서는 response를 읽을 수 없으므로, 전송 성공으로 간주
    markSubmitted(week);
    saveStudentInfo();

    resultEl.className = 'submit-result success';
    resultEl.textContent = '제출이 완료되었습니다! 수고하셨습니다.';
    resultEl.style.display = 'block';
    btn.textContent = '제출 완료';

    // 상태 배지 업데이트
    const card = document.getElementById(`card-${week}`);
    const statusEl = card.querySelector('.week-status');
    if (statusEl) {
      statusEl.className = 'week-status submitted';
      statusEl.textContent = '제출 완료';
    }

  } catch (error) {
    resultEl.className = 'submit-result error';
    resultEl.textContent = '오류가 발생했습니다. 다시 시도해주세요. (' + error.message + ')';
    resultEl.style.display = 'block';
    btn.disabled = false;
    btn.classList.remove('uploading');
    btn.textContent = '제출하기';
  }
}

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const base64 = reader.result.split(',')[1]; // data:...;base64, 이후 부분
      resolve(base64);
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// ===== 토글 =====
function toggleWeek(week) {
  const card = document.getElementById(`card-${week}`);
  if (card.classList.contains('locked')) return;
  card.classList.toggle('expanded');
}

// ===== 초기화 =====
document.addEventListener('DOMContentLoaded', () => {
  loadStudentInfo();
  renderWeeks();

  // 이름/학번 자동 저장
  document.getElementById('studentName').addEventListener('blur', saveStudentInfo);
  document.getElementById('studentId').addEventListener('blur', saveStudentInfo);

  // 첫 번째 열린 주차 중 미제출 자동 펼침
  const openWeek = getOpenWeek();
  const submissions = getSubmissions();
  for (let i = openWeek; i >= 1; i--) {
    const w = WEEKS.find(w => w.week === i);
    if (w && w.content && !submissions[i]) {
      setTimeout(() => toggleWeek(i), 300);
      break;
    }
  }
});
</script>
